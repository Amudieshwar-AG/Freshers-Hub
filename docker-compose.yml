version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: rit-postgres
    environment:
      POSTGRES_USER: rit_admin
      POSTGRES_PASSWORD: rit_password
      POSTGRES_DB: rit_freshers_hub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: rit-minio
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  miniodata:
    driver: local
